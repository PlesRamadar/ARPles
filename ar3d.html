<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Location-based AR with 3D Object</title>
    <link rel="stylesheet" href="style.css">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js with pure Location-Based Support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <!-- Look-at component so the 3D model always faces the camera -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <!-- Gesture Detector and Handler for AR.js -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body class="ar-page">
    <a href="index.html" class="exit-btn">Keluar AR</a>

    <!-- a-scene starts the AR application -->
    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector
        id="scene">

        <!-- 
            Catatan: Jika ukuran file .glb Anda kecil (di bawah 10 MB), Anda dapat 
            memuatnya menggunakan <a-assets> untuk preload. Jika ukurannya besar,
            sebaiknya panggil langsung lewat url() di entitas agar tidak memblokir kamera.
        -->
        <!-- <a-assets>
            <a-asset-item id="model-glb" src="assets/3d/model.glb"></a-asset-item>
        </a-assets> -->

        <!-- Kursor disesuaikan agar fuse: false (klik instan) untuk sentuhan layar HP -->
        <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>

        <!-- Kita menggunakan Wrapper untuk titik GPS-nya -->
        <a-entity gps-entity-place="latitude: -8.221436798254762; longitude: 114.36766775848618;">

            <!-- Objek 3D .glb ditaruh 15 meter di depan agar tidak menutupi kamera -->
            <!-- Kita memanggil file langsung dengan url() agar proses muat asinkron -->
            <a-entity id="my-3d-object" class="clickable" gesture-handler="minScale: 0.1; maxScale: 10"
                gltf-model="url(assets/3d/model.glb)" scale="1 1 1" position="0 0 -15" look-at="[gps-camera]">
            </a-entity>
        </a-entity>

        <!-- Kamera GPS -->
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
</body>

</html>
