<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Location-based AR with 2D Image</title>
    <link rel="stylesheet" href="style.css">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js with pure Location-Based Support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <!-- Look-at component so the 2D image always faces the camera -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <!-- Gesture Detector and Handler for AR.js -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body class="ar-page">
    <a href="splash.html" class="exit-btn">Keluar AR</a>

    <!-- a-scene starts the AR application -->
    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;" gesture-detector
        id="scene">

        <!-- Kursor mouse/sentuh (raycaster) untuk mendeteksi interaksi dengan objek class="clickable" -->
        <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>

        <!-- Wrapper to handle location and camera-facing -->
        <a-entity gps-entity-place="latitude: -8.221436798254762; longitude: 114.36766775848618;"
            look-at="[gps-camera]">
            <!-- Gambar 2D kita yang bisa di-zoom (pinch) dan di-rotate (drag) -->
            <a-image id="my-image" src="assets/poster.jpg" class="clickable" gesture-handler="minScale: 1; maxScale: 15"
                scale="5 5 5">
            </a-image>
        </a-entity>

        <!-- Kamera simulasi GPS -->
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
</body>

</html>
