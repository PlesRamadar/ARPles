<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Image Tracking AR</title>
    <link rel="stylesheet" href="style.css">
    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js with Image Tracking (NFT) Support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <!-- Gesture Detector and Handler for AR.js -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body class="ar-page">
    <a href="index.html" class="exit-btn">Keluar AR</a>

    <!-- a-scene untuk Image Tracking (NFT) -->
    <a-scene 
        vr-mode-ui="enabled: false" 
        renderer="logarithmicDepthBuffer: true;"
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" 
        gesture-detector
        id="scene">

        <!-- Kursor untuk interaksi raycaster -->
        <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>

        <!-- NFT Marker (Tracking Gambar Bebas) -->
        <!-- url menunjuk ke file descriptor (assets/target) -->
        <a-nft
            type="nft"
            url="assets/target"
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5"
            raycaster="objects: .clickable" 
            emitevents="true" 
            id="markerA">
            
            <!-- Objek 3D berwujud gambar poster kita -->
            <!-- Ukurannya dibesarkan karena NFT memakai skala piksel/dunia nyata gambar -->
            <a-box 
                id="my-image-marker" 
                src="assets/poster.jpg" 
                class="clickable" 
                gesture-handler="minScale: 0.5; maxScale: 5"
                width="150" height="200" depth="5"
                position="75 0 -100"
                rotation="-90 0 0">
            </a-box>
        </a-nft>

        <!-- Kamera Default -->
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
